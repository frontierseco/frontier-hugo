<script>
(() => {
  'use strict';

  /* ── Header scroll shadow ── */
  const header = document.getElementById('site-header');
  if (header) {
    window.addEventListener('scroll', () =>
      header.classList.toggle('scrolled', window.scrollY > 10), { passive: true });
  }

  /* ── Mobile menu ── */
  const mBtn  = document.getElementById('mobile-btn');
  const mMenu = document.getElementById('mobile-menu');
  if (mBtn && mMenu) {
    mBtn.addEventListener('click', () => {
      const open = mMenu.style.display === 'block';
      mMenu.style.display = open ? 'none' : 'block';
      mBtn.setAttribute('aria-expanded', !open);
    });
  }
  window.closeMob = () => { if (mMenu) mMenu.style.display = 'none'; };

  /* ── Hero slider ── */
  const slides = Array.from(document.querySelectorAll('.slide'));
  if (slides.length) {
    const dots = Array.from(document.querySelectorAll('.dot'));
    let cur = 0, autoplay;

    function loadSlide(i) {
      const s  = slides[i];
      const bg = s.dataset.bg;
      if (bg && !bg.startsWith('PLACEHOLDER') && !s.style.backgroundImage) {
        const img = new Image();
        img.onload = () => { s.style.backgroundImage = `url('${bg}')`; };
        img.src = bg;
      }
    }
    function goTo(i) {
      slides[cur].classList.remove('active');
      dots[cur] && dots[cur].classList.remove('active');
      cur = ((i % slides.length) + slides.length) % slides.length;
      slides[cur].classList.add('active');
      dots[cur] && dots[cur].classList.add('active');
      loadSlide((cur + 1) % slides.length);
      const vid = slides[cur].querySelector('video');
      if (vid) { vid.currentTime = 0; vid.play(); }
    }
    window.addEventListener('load', () => loadSlide(1));
    document.getElementById('prev-btn')?.addEventListener('click', () => goTo(cur - 1));
    document.getElementById('next-btn')?.addEventListener('click', () => goTo(cur + 1));
    dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.slide)));
    const hero = document.getElementById('hero');

    /* ── Touch swipe for mobile hero ── */
    let heroTouchX = 0;
    hero?.addEventListener('touchstart', e => { heroTouchX = e.touches[0].clientX; }, { passive: true });
    hero?.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - heroTouchX;
      if (Math.abs(dx) > 50) goTo(cur + (dx < 0 ? 1 : -1));
    }, { passive: true });
  }

  /* ── Lazy background images (defined early so carousel clones can use it) ── */
  const bgObs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const el = e.target;
      const bg = el.dataset.bg;
      if (bg && !bg.startsWith('PLACEHOLDER')) {
        el.style.backgroundImage = `url('${bg}')`;
        delete el.dataset.bg;
      }
      bgObs.unobserve(el);
    });
  }, { rootMargin: '300px 0px' });

  document.querySelectorAll('[data-bg]').forEach(el => {
    if (!el.classList.contains('slide')) bgObs.observe(el);
  });

  /* ── Lazy img tags ── */
  const imgObs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const img = e.target;
      img.src = img.dataset.src;
      imgObs.unobserve(img);
    });
  }, { rootMargin: '200px 0px' });
  document.querySelectorAll('img[data-src]').forEach(img => imgObs.observe(img));

  /* ══════════════════════════════════════════════════════════════
     Construction Materials — infinite auto-scroll carousel
  ══════════════════════════════════════════════════════════════ */
  const matOuter = document.getElementById('mat-outer');
  const matTrack = document.getElementById('mat-track');

  if (matOuter && matTrack) {
    const origCards = Array.from(matTrack.children);
    const N = origCards.length;

    /* ── Compute card width in px (avoids flex-% ambiguity) ── */
    function cols() {
      return window.innerWidth >= 1024 ? 4 : window.innerWidth >= 640 ? 2 : 1;
    }
    function cardPx() {
      return matOuter.offsetWidth / cols();
    }

    /* ── Apply pixel widths to every card (original + clones) ── */
    function applyWidths() {
      const w = cardPx();
      Array.from(matTrack.children).forEach(c => {
        c.style.flex = 'none';
        c.style.width = w + 'px';
      });
    }

    /* ── Clone originals for seamless loop ── */
    origCards.forEach(card => {
      const clone = card.cloneNode(true);
      clone.setAttribute('draggable', 'false'); // prevent native drag
      matTrack.appendChild(clone);
      clone.querySelectorAll('[data-bg]').forEach(el => bgObs.observe(el));
    });
    /* also mark originals as non-draggable */
    origCards.forEach(c => c.setAttribute('draggable', 'false'));

    applyWidths();

    /* Resize: recompute widths, keep offset in bounds */
    window.addEventListener('resize', () => {
      applyWidths();
      const ow = cardPx() * N;
      if (ow > 0) offset = ((offset % ow) + ow) % ow;
      applyOffset();
    }, { passive: true });

    /* ── Scroll state ── */
    let offset    = 0;   // px from left
    let paused    = false;
    let lastTime  = null;

    function totalOrigW() { return cardPx() * N; }
    function speed()      { return cardPx() / 4000; } // 4 s per card

    function applyOffset() {
      matTrack.style.transform = `translateX(${-offset}px)`;
    }

    /* ── RAF auto-scroll loop ── */
    function tick(ts) {
      if (lastTime !== null && !paused) {
        const dt = Math.min(ts - lastTime, 50); // cap so hidden-tab jump doesn't skip
        const ow = totalOrigW();
        if (ow > 0) {
          offset += speed() * dt;
          if (offset >= ow) offset -= ow;   // seamless forward wrap
          if (offset < 0)   offset += ow;   // guard negative
          applyOffset();
        }
      }
      lastTime = ts;
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    /* ── Pause on hover ── */
    matOuter.addEventListener('mouseenter', () => { paused = true; });
    matOuter.addEventListener('mouseleave', () => { paused = false; lastTime = null; });

    /* ── Mouse-wheel scroll ── */
    matOuter.addEventListener('wheel', e => {
      e.preventDefault();
      const ow = totalOrigW();
      offset = ow > 0 ? (((offset + Math.sign(e.deltaY) * cardPx()) % ow) + ow) % ow : offset;
      applyOffset();
    }, { passive: false });

    /* ── Mouse drag ── */
    let dragStartX   = 0;
    let dragStartOff = 0;
    let isDragging   = false;
    let hasMoved     = false;

    matOuter.addEventListener('mousedown', e => {
      e.preventDefault();          // ← STOPS browser's native element drag
      isDragging   = true;
      hasMoved     = false;
      dragStartX   = e.clientX;
      dragStartOff = offset;
      paused       = true;
      matOuter.classList.add('dragging');
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = dragStartX - e.clientX;
      if (Math.abs(dx) > 4) hasMoved = true;
      const ow = totalOrigW();
      offset = ow > 0 ? (((dragStartOff + dx) % ow) + ow) % ow : dragStartOff + dx;
      applyOffset();
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      matOuter.classList.remove('dragging');
      paused    = false;
      lastTime  = null;
    });

    /* Suppress link navigation when user dragged instead of clicked */
    matOuter.addEventListener('click', e => {
      if (hasMoved) {
        e.preventDefault();
        e.stopPropagation();
        hasMoved = false;
      }
    }, true);

    /* ── Touch drag ── */
    let touchStartX   = 0;
    let touchStartOff = 0;
    let touchMoved    = false;

    matOuter.addEventListener('touchstart', e => {
      touchStartX   = e.touches[0].clientX;
      touchStartOff = offset;
      touchMoved    = false;
      paused        = true;
    }, { passive: true });

    matOuter.addEventListener('touchmove', e => {
      const dx = touchStartX - e.touches[0].clientX;
      if (Math.abs(dx) > 4) touchMoved = true;
      const ow = totalOrigW();
      offset = ow > 0 ? (((touchStartOff + dx) % ow) + ow) % ow : touchStartOff + dx;
      applyOffset();
    }, { passive: true });

    matOuter.addEventListener('touchend', e => {
      if (touchMoved) e.preventDefault();
      paused   = false;
      lastTime = null;
    });
  }

})();
</script>
