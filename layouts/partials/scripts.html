<script>
(() => {
  'use strict';

  /* ── Header scroll shadow ── */
  const header = document.getElementById('site-header');
  if (header) {
    window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY > 10), { passive: true });
  }

  /* ── Mobile menu ── */
  const mBtn  = document.getElementById('mobile-btn');
  const mMenu = document.getElementById('mobile-menu');
  if (mBtn && mMenu) {
    mBtn.addEventListener('click', () => {
      const open = mMenu.style.display === 'block';
      mMenu.style.display = open ? 'none' : 'block';
      mBtn.setAttribute('aria-expanded', !open);
    });
  }
  window.closeMob = () => { if (mMenu) mMenu.style.display = 'none'; };

  /* ── Hero slider ── */
  const slides = Array.from(document.querySelectorAll('.slide'));
  if (slides.length) {
    const dots = Array.from(document.querySelectorAll('.dot'));
    let cur = 0, autoplay;

    function loadSlide(i) {
      const s  = slides[i];
      const bg = s.dataset.bg;
      if (bg && !bg.startsWith('PLACEHOLDER') && !s.style.backgroundImage) {
        const img = new Image();
        img.onload = () => { s.style.backgroundImage = `url('${bg}')`; };
        img.src = bg;
      }
    }

    function goTo(i) {
      slides[cur].classList.remove('active');
      dots[cur]  && dots[cur].classList.remove('active');
      cur = ((i % slides.length) + slides.length) % slides.length;
      slides[cur].classList.add('active');
      dots[cur]  && dots[cur].classList.add('active');
      loadSlide((cur + 1) % slides.length);
    }

    function startAuto() {
      clearInterval(autoplay);
      autoplay = setInterval(() => goTo(cur + 1), 6000);
    }

    window.addEventListener('load', () => loadSlide(1));
    document.getElementById('prev-btn')?.addEventListener('click', () => { goTo(cur - 1); startAuto(); });
    document.getElementById('next-btn')?.addEventListener('click', () => { goTo(cur + 1); startAuto(); });
    dots.forEach(d => d.addEventListener('click', () => { goTo(+d.dataset.slide); startAuto(); }));
    const hero = document.getElementById('hero');
    hero?.addEventListener('mouseenter', () => clearInterval(autoplay));
    hero?.addEventListener('mouseleave', startAuto);
    startAuto();
  }

  /* ── Lazy background images ── */
  // Defined here so carousel clones can also be registered
  const bgObs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const el = e.target;
      const bg = el.dataset.bg;
      if (bg && !bg.startsWith('PLACEHOLDER')) {
        el.style.backgroundImage = `url('${bg}')`;
        delete el.dataset.bg;
      }
      bgObs.unobserve(el);
    });
  }, { rootMargin: '300px 0px' });

  document.querySelectorAll('[data-bg]').forEach(el => {
    if (!el.classList.contains('slide')) bgObs.observe(el);
  });

  /* ── Lazy img tags ── */
  const imgObs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const img = e.target;
      img.src = img.dataset.src;
      imgObs.unobserve(img);
    });
  }, { rootMargin: '200px 0px' });
  document.querySelectorAll('img[data-src]').forEach(img => imgObs.observe(img));

  /* ── Construction Materials infinite carousel ── */
  const matOuter = document.getElementById('mat-outer');
  const matTrack = document.getElementById('mat-track');

  if (matOuter && matTrack) {
    // Clone cards to create seamless loop
    const origCards = Array.from(matTrack.children);
    origCards.forEach(card => {
      const clone = card.cloneNode(true);
      matTrack.appendChild(clone);
      // Register cloned bg divs for lazy loading
      clone.querySelectorAll('[data-bg]').forEach(el => bgObs.observe(el));
    });

    let offset    = 0;        // px scrolled from left
    let paused    = false;
    let rafId     = null;
    let lastTime  = null;

    function cardWidth() {
      return origCards[0] ? origCards[0].getBoundingClientRect().width : matOuter.offsetWidth / 4;
    }

    function origWidth() {
      return cardWidth() * origCards.length;
    }

    // speed: 1 card = 4 000 ms → px per ms = cardWidth / 4000
    function speed() {
      return cardWidth() / 4000;
    }

    function applyOffset() {
      matTrack.style.transform = `translateX(${-offset}px)`;
    }

    function raf(ts) {
      if (lastTime !== null && !paused) {
        const dt = Math.min(ts - lastTime, 50); // cap at 50 ms (tab was hidden)
        offset += speed() * dt;
        // Wrap seamlessly
        const ow = origWidth();
        if (ow > 0 && offset >= ow) offset -= ow;
        applyOffset();
      }
      lastTime = ts;
      rafId = requestAnimationFrame(raf);
    }

    rafId = requestAnimationFrame(raf);

    /* Pause on hover */
    matOuter.addEventListener('mouseenter', () => { paused = true;  });
    matOuter.addEventListener('mouseleave', () => { paused = false; lastTime = null; });

    /* Mouse wheel scroll */
    matOuter.addEventListener('wheel', e => {
      e.preventDefault();
      offset += e.deltaY * 0.8;
      const ow = origWidth();
      if (ow > 0) {
        offset = ((offset % ow) + ow) % ow;
      }
      applyOffset();
    }, { passive: false });

    /* Mouse drag */
    let dragStartX  = 0;
    let dragStartOff = 0;
    let dragging    = false;
    let dragMoved   = false;

    matOuter.addEventListener('mousedown', e => {
      dragging     = true;
      dragMoved    = false;
      dragStartX   = e.clientX;
      dragStartOff = offset;
      matOuter.classList.add('dragging');
      paused = true;
    });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dx = dragStartX - e.clientX;
      if (Math.abs(dx) > 4) dragMoved = true;
      offset = dragStartOff + dx;
      const ow = origWidth();
      if (ow > 0) offset = ((offset % ow) + ow) % ow;
      applyOffset();
    });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      matOuter.classList.remove('dragging');
      paused = false;
      lastTime = null;
    });

    // Prevent link navigation when user dragged (not clicked)
    matOuter.addEventListener('click', e => {
      if (dragMoved) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);

    /* Touch drag */
    let touchStartX   = 0;
    let touchStartOff = 0;
    let touchMoved    = false;

    matOuter.addEventListener('touchstart', e => {
      touchStartX   = e.touches[0].clientX;
      touchStartOff = offset;
      touchMoved    = false;
      paused        = true;
    }, { passive: true });

    matOuter.addEventListener('touchmove', e => {
      const dx = touchStartX - e.touches[0].clientX;
      if (Math.abs(dx) > 4) touchMoved = true;
      offset = touchStartOff + dx;
      const ow = origWidth();
      if (ow > 0) offset = ((offset % ow) + ow) % ow;
      applyOffset();
    }, { passive: true });

    matOuter.addEventListener('touchend', e => {
      if (touchMoved) {
        // Suppress link if it was a drag
        e.preventDefault();
      }
      paused   = false;
      lastTime = null;
    });
  }

})();
</script>
