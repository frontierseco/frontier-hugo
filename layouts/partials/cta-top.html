{{ with index .Site.Data "cta-top" }}
{{ if .slogans }}
<style>#cta-top-bar:hover{background:#013a7a!important}</style>
<a href="{{ .link }}" id="cta-top-bar" style="display:block;background:#024EA4;color:white;text-align:center;font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;padding:.65rem 1rem;margin-bottom:2rem;line-height:1.6;">
  <span id="cta-top-line1">{{ (index .slogans 0).line1 }}</span><br>
  <span id="cta-top-line2">{{ (index .slogans 0).line2 }}</span>
</a>
<script>
(function(){
  var slogans = {{ .slogans | jsonify | safeJS }};
  var s = slogans[Math.floor(Math.random() * slogans.length)];
  document.getElementById('cta-top-line1').textContent = s.line1;
  document.getElementById('cta-top-line2').textContent = s.line2;
})();
</script>
{{ end }}
{{ end }}
