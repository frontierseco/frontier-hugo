{{ with .Site.Data.cta }}
<div style="margin-top:3rem;background:#024EA4;padding:2.5rem 2rem;text-align:center;">
  <h3 style="font-family:'Oswald',sans-serif;font-weight:700;color:white;font-size:1.5rem;letter-spacing:.05em;text-transform:uppercase;margin:0 0 1rem;">
    {{ .heading }}
  </h3>
  <p style="color:rgba(255,255,255,.85);font-size:.95rem;line-height:1.7;max-width:560px;margin:0 auto 1.5rem;">
    {{ .body }}
  </p>
  <style>#cta-call-btn:hover{background:#d94020!important}</style>
  <a id="cta-call-btn" href="{{ .button_link }}" style="display:inline-block;background:#F05336;color:white;font-family:'Oswald',sans-serif;font-size:.9rem;letter-spacing:.15em;text-transform:uppercase;padding:.75rem 2.25rem;text-decoration:none;">
    {{ .button_text }}
  </a>
</div>
{{ end }}
