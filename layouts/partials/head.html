<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Frontier Structural Engineering{{ end }}</title>
{{- $desc := or .Params.description .Params.summary .Site.Params.description }}
<meta name="description" content="{{ $desc }}">

<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}">

<!-- Open Graph -->
<meta property="og:type"        content="{{ if .IsHome }}website{{ else if eq .Section "articles" }}article{{ else }}website{{ end }}">
<meta property="og:url"         content="{{ .Permalink }}">
<meta property="og:title"       content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Frontier Structural Engineering{{ end }}">
<meta property="og:description" content="{{ $desc }}">
<meta property="og:site_name"   content="Frontier Structural Engineering">
{{- if .Params.thumbnail }}
<meta property="og:image"       content="{{ .Params.thumbnail | absURL }}">
{{- else if .Site.Params.ogImage }}
<meta property="og:image"       content="{{ .Site.Params.ogImage | absURL }}">
{{- end }}

<!-- Twitter Card -->
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Frontier Structural Engineering{{ end }}">
<meta name="twitter:description" content="{{ $desc }}">
{{- if .Params.thumbnail }}
<meta name="twitter:image"       content="{{ .Params.thumbnail | absURL }}">
{{- else if .Site.Params.ogImage }}
<meta name="twitter:image"       content="{{ .Site.Params.ogImage | absURL }}">
{{- end }}

<!-- JSON-LD Structured Data -->
{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": "Frontier Structural Engineering",
  "description": {{ .Site.Params.description | jsonify }},
  "url": {{ .Site.BaseURL | jsonify }},
  "telephone": "+17192472928",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Colorado Springs",
    "addressRegion": "CO",
    "addressCountry": "US"
  },
  "areaServed": ["Colorado", "California"],
  "serviceType": "Structural Engineering"
}
</script>
{{- else if eq .Section "articles" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ $desc | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02" | jsonify }},
  "author": {
    "@type": "Organization",
    "name": "Frontier Structural Engineering"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Frontier Structural Engineering",
    "url": {{ .Site.BaseURL | jsonify }}
  },
  "url": {{ .Permalink | jsonify }}{{ if .Params.thumbnail }},
  "image": {{ .Params.thumbnail | absURL | jsonify }}{{ end }}
}
</script>
{{- end }}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { brand: '#F05336', navy: '#024EA4' },
        fontFamily: {
          heading: ['Oswald','Helvetica','Arial','sans-serif'],
          body:    ['PT Sans','Helvetica','Arial','sans-serif'],
        }
      }
    }
  }
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'PT Sans', Helvetica, Arial, sans-serif; margin: 0; color: #1a1a1a; }
  h1, h2, h3, h4, h5 { font-family: 'Oswald', Helvetica, Arial, sans-serif; }
  a { transition: color .2s; }

  /* Header */
  #site-header { transition: box-shadow 0.3s ease; }
  #site-header.scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.12); }

  /* Divider */
  .divider { display:block; width:60px; height:3px; background:#F05336; margin:10px auto 28px; }
  .divider-left { margin:10px 0 28px; }

  /* Hero slider */
  .slider { position:relative; height:100vh; min-height:520px; overflow:hidden; }
  .slide {
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    background-color:#1c2b3a;
    opacity:0; transition:opacity .9s ease;
    display:flex; align-items:flex-end;
  }
  .slide.active { opacity:1; z-index:1; }
  .slide-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(0,0,0,.05) 40%,rgba(0,0,0,.5) 100%); }
  .slide-content { position:relative; z-index:2; padding:0 3rem 5rem; max-width:820px; }
  @media(max-width:640px){ .slide-content { padding:0 1.25rem 3.5rem; } }

  /* Dots */
  .slider-dots { position:absolute; bottom:1.5rem; left:50%; transform:translateX(-50%); display:flex; gap:10px; z-index:10; }
  .dot { width:12px; height:12px; border-radius:50%; background:rgba(255,255,255,.4); border:none; cursor:pointer; transition:background .3s,transform .2s; padding:0; }
  .dot.active { background:#F05336; transform:scale(1.25); }

  /* Arrows */
  .s-arrow { position:absolute; top:50%; transform:translateY(-50%); z-index:10; background:rgba(0,0,0,.3); border:none; color:white; font-size:2rem; width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .2s; line-height:1; }
  .s-arrow:hover { background:rgba(0,0,0,.55); }
  #prev-btn { left:1rem; } #next-btn { right:1rem; }

  /* Services grid — 4 cols, 2 rows */
  .services-grid { display:grid; grid-template-columns:repeat(4,1fr); }
  @media(max-width:900px){ .services-grid { grid-template-columns:repeat(2,1fr); } }
  @media(max-width:480px){ .services-grid { grid-template-columns:1fr; } }

  /* Service tiles — 2x height, image zoom on hover */
  .tile { position:relative; min-height:600px; background-color:#2a3a4a; display:flex; align-items:flex-end; overflow:hidden; text-decoration:none; }
  .tile-bg { position:absolute; inset:0; background-size:cover; background-position:center; transition:transform .5s ease; z-index:0; }
  .tile:hover .tile-bg { transform:scale(1.1); }
  .tile-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(0,0,0,.08) 30%,rgba(0,0,0,.68) 100%); transition:opacity .3s; z-index:1; }
  .tile:hover .tile-overlay { opacity:.9; }
  .tile-content { position:relative; z-index:2; padding:1.5rem; }
  @media(max-width:640px){ .tile { min-height:320px; } }

  /* Construction Materials infinite scroll */
  .mat-outer { width:100%; overflow:hidden; cursor:grab; user-select:none; }
  .mat-outer.dragging { cursor:grabbing; }
  .mat-track { display:flex; will-change:transform; }
  .mat-card { flex:0 0 25%; text-decoration:none; position:relative; height:420px; overflow:hidden; display:flex; align-items:flex-end; border-right:1px solid rgba(255,255,255,.06); }
  .mat-card-bg { position:absolute; inset:0; background-size:cover; background-position:center; background-color:#2a3a4a; transition:transform .5s ease; z-index:0; }
  .mat-card:hover .mat-card-bg { transform:scale(1.1); }
  .mat-card-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(0,0,0,.05) 20%,rgba(0,0,0,.78) 100%); z-index:1; }
  .mat-card-body { position:relative; z-index:2; padding:1.25rem; }
  .mat-card-title { font-family:'Oswald',sans-serif; font-weight:700; color:#F05336; font-size:1.35rem; margin:0 0 .4rem; line-height:1.2; }
  .mat-card-desc { color:rgba(255,255,255,.85); font-size:.8rem; line-height:1.6; margin:0 0 .6rem; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .mat-card-tag { display:inline-block; font-size:.8rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.5); }
  @media(max-width:1024px){ .mat-card { flex-basis:50%; } }
  @media(max-width:640px){ .mat-card { flex-basis:100%; height:320px; } }

  /* Featured project card */
  .pfeatured { display:grid; grid-template-columns:3fr 2fr; background:white; overflow:hidden; text-decoration:none; color:inherit; transition:box-shadow .25s; margin-bottom:1.5rem; }
  .pfeatured:hover { box-shadow:0 8px 28px rgba(0,0,0,.16); }
  .pfeatured-img { position:relative; min-height:300px; overflow:hidden; }
  .pfeatured-img img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform .45s ease; }
  .pfeatured:hover .pfeatured-img img { transform:scale(1.04); }
  .pfeatured-body { padding:2rem 2.25rem; display:flex; flex-direction:column; justify-content:center; gap:.6rem; }
  @media(max-width:640px){ .pfeatured { grid-template-columns:1fr; } .pfeatured-img { min-height:200px; } }

  /* Project cards */
  .pcard { background:white; overflow:hidden; transition:box-shadow .25s; }
  .pcard-img { width:100%; height:200px; object-fit:cover; display:block; background:#d1d5db; transition:transform .45s ease; }
  .pcard:hover { box-shadow:0 6px 22px rgba(0,0,0,.14); }
  .pcard:hover .pcard-img { transform:scale(1.06); }

  /* Article items (full list page) */
  .art-item { display:flex; gap:1.25rem; align-items:flex-start; transition:background .2s; border-radius:3px; padding:.4rem; margin:-.4rem; }
  .art-item:hover { background:#f5f5f5; }
  .art-thumb { width:160px; min-width:160px; height:108px; object-fit:cover; background:#e5e7eb; flex-shrink:0; transition:transform .45s ease; }
  .art-item:hover .art-thumb { transform:scale(1.04); }
  @media(max-width:640px){ .art-item { flex-direction:column; } .art-thumb { width:100%; height:160px; } }

  /* Article items (homepage compact) */
  .art-item-sm { display:flex; gap:.9rem; align-items:center; transition:background .2s; border-radius:3px; padding:.35rem; margin:-.35rem; }
  .art-item-sm:hover { background:#f5f5f5; }
  .art-thumb-sm { width:80px; min-width:80px; height:56px; object-fit:cover; background:#e5e7eb; flex-shrink:0; border-radius:3px; }
  @media(max-width:640px){ .art-thumb-sm { width:60px; min-width:60px; height:42px; } }

  /* Footer */
  #site-footer { background:#024EA4; }

  /* Single post */
  .prose { max-width:760px; margin:0 auto; line-height:1.8; font-size:1.05rem; }
  .prose h2 { font-family:'Oswald',sans-serif; color:#F05336; margin-top:2rem; }
  .prose img { max-width:100%; height:auto; margin:1.5rem 0; }
</style>
